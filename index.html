<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сайт о маникюре</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<header>

    <h1>Сайт о маникюре</h1>

    <button id="theme-toggle"
            aria-label="Переключить тему">
        🌙
    </button>

    <button class="burger"
            id="burger-btn"
            aria-label="Открыть меню">
        ☰
    </button>

    <nav>
        <a href="#about">Обо мне</a>
        <a href="#projects">Работы</a>
        <a href="#contact">Контакты</a>
    </nav>

</header>

<main>

    <section id="about">

        <h2>О себе</h2>

        <p>
            Привет! Я Окладникова Ульяна, и моё любимое дело —
            создание красивого маникюра.
        </p>

        <div class="extra-info" id="extra-info">

            <p>
                Я постоянно изучаю новые техники,
                материалы и современные дизайны.
            </p>

        </div>

        <button id="toggle-btn">
            Показать больше
        </button>

    </section>

    <section id="projects">

        <h2>Примеры работ</h2>

        <div class="filters">

            <button class="active"
                    data-filter="all">
                Все
            </button>

          

            <button data-filter="creative">
                Креатив
            </button>

            <button data-filter="design">
                Дизайн
            </button>

        </div>

        <input type="text"
               id="search-input"
               placeholder="Поиск работы">

        <div class="projects-grid"
             id="projects-grid">
        </div>

    </section>

</main>

<section id="contact">

    <h2>Записаться на приём</h2>

    <form id="contact-form">

        <label for="name">
            Имя
        </label>

        <input type="text"
               id="name"
               name="name">

        <span class="error"
              id="name-error"></span>

        <label for="email">
            Email
        </label>

        <input type="email"
               id="email"
               name="email">

        <span class="error"
              id="email-error"></span>

        <label for="message">
            Сообщение
        </label>

        <textarea id="message"
                  name="message"></textarea>

        <button type="submit">
            Отправить
        </button>

    </form>

</section>

<footer>

    <p>
        © 2026 Ульяна.
        Обновлено:
        <span id="update-date"></span>
    </p>

</footer>

<script src="script.js"></script>

</body>
</html>
